<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#2d2d2d"/>

  <!-- Face -->
  <ellipse cx="50" cy="70" rx="15" ry="11" fill="#c8956c"/>

  <!-- Hat crown -->
  <path d="M31,47 C30,38 32,24 50,21 C68,24 70,38 69,47 Z" fill="white"/>
  <!-- Crease on top -->
  <path d="M42,22 Q50,19 58,22" stroke="#2d2d2d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Hat brim -->
  <rect x="13" y="45" width="74" height="9" rx="4.5" fill="white"/>

  <!-- Sunglasses: dark lenses with white frames -->
  <circle cx="33" cy="64" r="12" fill="#111111" stroke="white" stroke-width="2.5"/>
  <circle cx="67" cy="64" r="12" fill="#111111" stroke="white" stroke-width="2.5"/>
  <!-- Bridge -->
  <line x1="45" y1="64" x2="55" y2="64" stroke="white" stroke-width="2.5"/>
  <!-- Temple arms -->
  <line x1="21" y1="64" x2="12" y2="59" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="79" y1="64" x2="88" y2="59" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Lens glare -->
  <circle cx="29" cy="61" r="2.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="63" cy="61" r="2.5" fill="rgba(255,255,255,0.25)"/>
</svg>
